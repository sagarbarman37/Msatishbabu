<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Satish Babu</title>
    <link rel="shortcut icon" href="./photo/satishbabu.ico" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    </head>
    <body>
    <div class="container">
        <div class="background-box">
            <div class="first-box">
                <img src="./photo/logo.png" alt="logo">
                <a href="https://acmetoolings.com/" target="_blank"><h3>ARCE POLYMERS PVT LTD</h3></a>
            </div>
            <div class="sec-box">
                <div class="name">
                    <h1>M Satish Babu</h1>
                    <h2>Deputy Manager</h2>
                    <p>Process Engineer</p>
                </div>
            </div>
        </div>
        <div class="logo">
            <div class="satishBabu"></div>
        </div>
        <div class="contacts">
            <button id="phone" class="contact">
                <i class="ri-phone-fill"></i>
                <span>Phone</span>
            </button>
            <button id="whatsapp" class="contact">
                <i class="ri-whatsapp-line"></i>
                <span>WhatsApp</span>
            </button>
            <button id="facebook" class="contact">
                <i class="ri-facebook-circle-fill"></i>
                <span>Facebook</span>
            </button>
            <button id="email" class="contact">
                <i class="ri-mail-line"></i>
                <span>Email</span>
            </button>
            <button id="location" class="contact">
                <i class="ri-map-pin-line"></i>
                <span>Location</span>
            </button>
        </div>
    </div>
    
    <script type="module" src="./index.js"></script>   
</body>
</html>
